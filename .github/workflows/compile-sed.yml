name: Build BusyBox (sed) to WebAssembly
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-busybox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox
        working-directory: ./busybox-src
        run: |
          # 1. Start with a total "no" config
          make allnoconfig
          
          # 2. Force the config to accept "None" for shells to avoid the choice menu
          sed -i 's/# CONFIG_SH_IS_NONE is not set/CONFIG_SH_IS_NONE=y/' .config
          sed -i 's/# CONFIG_BASH_IS_NONE is not set/CONFIG_BASH_IS_NONE=y/' .config
          
          # 3. Enable SED and Static linking
          # We use >> to ensure they are added if not present, and sed to flip them if they are
          echo "CONFIG_SED=y" >> .config
          echo "CONFIG_STATIC=y" >> .config
          sed -i 's/.*CONFIG_SED.*/CONFIG_SED=y/' .config
          sed -i 's/.*CONFIG_STATIC.*/CONFIG_STATIC=y/' .config
          
          # 4. Now run oldconfig - it will be silent because the 'choices' are already resolved
          make oldconfig KCONFIG_NOTIMESTAMP=1 < /dev/null
          
          # 5. Emscripten header fix
          sed -i 's/char BUG_off_t_size_is_misdetected/ \/\/ char BUG_off_t_size_is_misdetected/' include/libbb.h

      - name: Compile Objects
        working-directory: ./busybox-src
        run: |
          # Build only the libraries needed for sed. This is very fast.
          emmake make -j$(nproc) \
            CC=emcc \
            CFLAGS="-D_POSIX_C_SOURCE=200809L -D_FILE_OFFSET_BITS=32" \
            SKIP_STRIP=y \
            editors/lib.a libbb/lib.a

      - name: Link to WebAssembly
        run: |
          # 1. Provide the missing symbol and a clean entry point
          cat <<EOF > wasm_main.c
          const char *applet_name = "sed";
          int sed_main(int argc, char **argv);
          int main(int argc, char **argv) {
              return sed_main(argc, argv);
          }
          EOF

          # 2. Prepare the library without the conflicting appletlib.o
          cp busybox-src/libbb/lib.a libbb_trimmed.a
          ar d libbb_trimmed.a appletlib.o
          
          mkdir -p dist
          
          # 3. Link with --whole-archive to ensure all internal dependencies are included
          emcc -O2 \
            wasm_main.c \
            -Wl,--whole-archive busybox-src/editors/lib.a libbb_trimmed.a -Wl,--no-whole-archive \
            -o dist/busybox.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createBusyBox \
            -s ENVIRONMENT=web \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_RUNTIME_METHODS='["FS","callMain"]' \
            -s EXPORTED_FUNCTIONS='["_main","_malloc","_free"]' \
            -s EXIT_RUNTIME=0 \
            -s INVOKE_RUN=0 \
            -s INITIAL_MEMORY=33554432 \
            -s ALLOW_MEMORY_GROWTH=1

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/busybox.js dist/busybox.wasm
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update compiled busybox-sed wasm"
            git push
          fi
