name: Build BusyBox (sed) to WebAssembly
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-busybox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox
        working-directory: ./busybox-src
        run: |
          make allnoconfig
          # Set options directly — no heredoc, no printf, no append
          # allnoconfig writes the full .config; we flip only what we need
          sed -i 's/# CONFIG_SED is not set/CONFIG_SED=y/' .config
          sed -i 's/CONFIG_ASH=y/CONFIG_ASH=n/' .config
          sed -i 's/CONFIG_HUSH=y/CONFIG_HUSH=n/' .config
          # Ensure entries exist even if allnoconfig omitted them entirely
          grep -q 'CONFIG_SED' .config   || echo 'CONFIG_SED=y'   >> .config
          grep -q 'CONFIG_ASH' .config   || echo 'CONFIG_ASH=n'   >> .config
          grep -q 'CONFIG_HUSH' .config  || echo 'CONFIG_HUSH=n'  >> .config
          grep -q 'CONFIG_STATIC' .config || echo 'CONFIG_STATIC=y' >> .config
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          # Verify
          echo "=== relevant config ===" && grep -E 'CONFIG_(SED|ASH|HUSH|STATIC)' .config
          sed -i 's/char BUG_off_t_size_is_misdetected/ \/\/ char BUG_off_t_size_is_misdetected/' include/libbb.h
          make oldconfig KCONFIG_NOTIMESTAMP=1 < /dev/null

      - name: Compile Objects
        working-directory: ./busybox-src
        run: |
          emmake make -j$(nproc) \
            CC=emcc \
            CFLAGS="-D_POSIX_C_SOURCE=200809L -D_FILE_OFFSET_BITS=32" \
            SKIP_STRIP=y || true
          echo "=== editors/lib.a ===" && ls -lh editors/lib.a || echo "MISSING editors/lib.a"
          echo "=== sed_main presence ===" && nm editors/lib.a 2>/dev/null | grep sed_main || echo "sed_main NOT FOUND in editors/lib.a"
          echo "=== editors objects ===" && ls editors/*.o 2>/dev/null || echo "no .o files in editors/"

      - name: Link to WebAssembly
        run: |
          printf 'int sed_main(int argc, char **argv);\nint main(int argc, char **argv) {\n  return sed_main(argc, argv);\n}\n' > wasm_main.c
          mkdir -p dist
          emcc -O3 \
            wasm_main.c \
            busybox-src/editors/lib.a \
            busybox-src/libbb/lib.a \
            -o dist/busybox.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createBusyBox \
            -s ENVIRONMENT=web \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_RUNTIME_METHODS='["FS","callMain"]' \
            -s EXPORTED_FUNCTIONS='["_main","_malloc","_free","_sed_main"]' \
            -s EXIT_RUNTIME=0 \
            -s INVOKE_RUN=0 \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s INITIAL_MEMORY=33554432 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -Wl,--whole-archive busybox-src/editors/lib.a -Wl,--no-whole-archive

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm --cached -f dist/busybox.js dist/busybox.wasm 2>/dev/null || true
          git add -f dist/busybox.js dist/busybox.wasm
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update compiled busybox-sed wasm"
            git push
          fi
