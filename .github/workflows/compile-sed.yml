name: Compile GNU Sed to WebAssembly

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Cache Emscripten SDK to avoid reinstall every run
      - name: Cache Emscripten
        uses: actions/cache@v4
        with:
          path: ~/.emsdk
          key: emsdk-latest

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Download GNU Sed Source
        run: |
          wget https://ftp.gnu.org/gnu/sed/sed-4.9.tar.xz
          tar -xf sed-4.9.tar.xz
          mv sed-4.9 sed-src

      # Critical: ensure config.guess exists and is modern enough
      - name: Fix Autotools Host Detection
        working-directory: ./sed-src
        run: |
          wget -O config.guess 'https://git.savannah.gnu.org/cgit/config.git/plain/config.guess'
          chmod +x config.guess

      - name: Configure (WASM-safe)
        working-directory: ./sed-src
        run: |
          export CONFIG_SITE=/dev/null

          emconfigure env CONFIG_SITE=/dev/null ./configure \
            --host=wasm32-unknown-emscripten \
            --build=$(./config.guess) \
            --disable-nls \
            --disable-threads \
            --disable-shared \
            --disable-rpath \
            --cache-file=config.cache \
            ac_cv_func_nanosleep=yes \
            ac_cv_func_sleep=yes \
            ac_cv_func_alarm=no \
            ac_cv_func_inet_pton=no \
            ac_cv_prog_cc_c99=yes \
            gl_cv_func_nanosleep_standard=yes \
            gl_cv_func_sleep_works=yes

      - name: Build
        working-directory: ./sed-src
        run: |
          emmake make -j1

      - name: Link to WebAssembly
        working-directory: ./sed-src
        run: |
          mkdir -p ../dist

          emcc sed/sed.o \
            -O3 \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createSed \
            -s INVOKE_RUN=0 \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_FUNCTIONS='["_main"]' \
            -o ../dist/sed.js

      - name: Verify Output
        run: |
          ls -lah dist

      - name: Commit and Push WASM Build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dist/sed.js dist/sed.wasm

          if git diff --staged --quiet; then
            echo "No changes to WASM output"
            exit 0
          fi

          git commit -m "chore: rebuild GNU sed wasm"
          git push
