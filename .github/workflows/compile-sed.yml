name: Build BusyBox (sed) to WebAssembly
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-busybox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.61"

      - name: Install build dependencies
        run: sudo apt-get install -y libncurses-dev

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox (Minimal Sed)
        working-directory: ./busybox-src
        run: |
          make allnoconfig

          cat >> .config << 'EOF'
          CONFIG_SED=y
          CONFIG_LFS=n
          CONFIG_STATIC=y
          CONFIG_FEATURE_SHOW_USAGE=n
          CONFIG_LONG_OPTS=n
          CONFIG_FEATURE_DEVPTS=n
          CONFIG_MONOTONIC_SYSCALL=n
          CONFIG_IOCTL_HEX2STR_ERROR=n
          EOF

          sed -i \
            's/char BUG_off_t_size_is_misdetected\[sizeof(off_t) == sizeof(uoff_t) ? 1 : -1\]/char BUG_off_t_size_is_misdetected[1]/' \
            include/libbb.h

          make oldconfig KCONFIG_NOTIMESTAMP=1 < /dev/null

      - name: Patch missing WASM syscalls
        working-directory: ./busybox-src
        run: |
          sed -i '1s|^|/* WASM stub */\n#include <unistd.h>\n#define sigsuspend(mask) (pause(), 0)\n|' \
            libbb/signals.c

      - name: Compile Objects
        working-directory: ./busybox-src
        env:
          EM_CACHE: ${{ github.workspace }}/.emcache
        run: |
          emmake make -j$(nproc) \
            CC=emcc \
            AR=emar \
            RANLIB=emranlib \
            CFLAGS="-D_POSIX_C_SOURCE=200809L -D_FILE_OFFSET_BITS=32 -Wno-error" \
            SKIP_STRIP=y \
            applets/applets.o editors/lib.a libbb/lib.a 2>&1 | tee build.log

      - name: Verify required objects exist
        working-directory: ./busybox-src
        run: |
          for f in include/applet_tables.h editors/lib.a libbb/lib.a; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              grep -i error build.log | tail -20
              exit 1
            fi
          done
          echo "All required objects present."

      - name: Link to WebAssembly
        working-directory: ./busybox-src
        run: |
          mkdir -p ../dist
          emcc -O2 \
            applets/applets.o \
            editors/lib.a \
            libbb/lib.a \
            -o ../dist/busybox-sed.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME="createBusyBoxSed" \
            -s ENVIRONMENT=web \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_FUNCTIONS='["_main","_malloc","_free"]' \
            -s EXPORTED_RUNTIME_METHODS='["callMain","FS","allocateUTF8","UTF8ToString"]' \
            -s EXIT_RUNTIME=0 \
            -s INVOKE_RUN=0 \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s INITIAL_MEMORY=33554432 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s STACK_SIZE=524288 \
            --no-entry

      - name: Smoke-test the output
        run: |
          node -e "
            const factory = require('./dist/busybox-sed.js');
            factory().then(mod => {
              mod.FS.writeFile('/test.txt', 'hello world\n');
              const rc = mod.callMain(['sed', 's/hello/goodbye/', '/test.txt']);
              const out = mod.FS.readFile('/test.txt', { encoding: 'utf8' });
              console.log('exit code:', rc);
              console.log('output file:', out);
              process.exit(rc);
            });
          "

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/busybox-sed.js dist/busybox-sed.wasm
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update busybox-sed wasm build"
            git push
          fi
