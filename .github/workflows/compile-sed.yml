name: Build BusyBox (sed) to WebAssembly
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-busybox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox
        working-directory: ./busybox-src
        run: |
          make allnoconfig
          # Use a heredoc to force-write the config
          cat <<EOF > .config
          CONFIG_SED=y
          CONFIG_FEATURE_SED_LONG_OPTIONS=y
          CONFIG_STATIC=y
          CONFIG_SH_IS_NONE=y
          CONFIG_BASH_IS_NONE=y
          EOF
          make oldconfig KCONFIG_NOTIMESTAMP=1 < /dev/null
          sed -i 's/char BUG_off_t_size_is_misdetected/ \/\/ char BUG_off_t_size_is_misdetected/' include/libbb.h

      - name: Compile Objects
        working-directory: ./busybox-src
        run: |
          # Build only the specific object files
          emmake make -j$(nproc) CC=emcc editors/sed.o libbb/verror_msg.o libbb/xfuncs_printf.o libbb/last_char_is.o libbb/copy_common.o libbb/get_last_path_component.o
          # Also build the rest of libbb just in case sed needs more helpers
          emmake make -j$(nproc) CC=emcc libbb/lib.a editors/lib.a

      - name: Link to WebAssembly
        run: |
          # Create the wrapper
          cat <<EOF > wasm_main.c
          const char *applet_name = "sed";
          extern int sed_main(int argc, char **argv);
          int main(int argc, char **argv) {
              return sed_main(argc, argv);
          }
          EOF

          mkdir -p dist
          
          # Link using the object files directly + the archives as fallback
          # This ensures sed_main is visible to the linker
          emcc -O2 \
            wasm_main.c \
            busybox-src/editors/sed.o \
            -Wl,--whole-archive busybox-src/libbb/lib.a -Wl,--no-whole-archive \
            -o dist/busybox.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createBusyBox \
            -s ENVIRONMENT=web \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_RUNTIME_METHODS='["FS","callMain"]' \
            -s EXIT_RUNTIME=0 \
            -s INVOKE_RUN=0 \
            -s INITIAL_MEMORY=33554432 \
            -s ALLOW_MEMORY_GROWTH=1

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/busybox.js dist/busybox.wasm
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update compiled busybox-sed wasm"
            git push
          fi
