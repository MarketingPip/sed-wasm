name: Build BusyBox (sed) to WebAssembly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-busybox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox (Minimal Sed)
        working-directory: ./busybox-src
        run: |
          make allnoconfig

          cat >> .config << 'EOF'
          CONFIG_SED=y
          CONFIG_LFS=n
          CONFIG_HUSH=n
          CONFIG_ASH=n
          CONFIG_SH_IS_NONE=y
          CONFIG_FEATURE_SH_REPLY=n
          CONFIG_FEATURE_SHOW_USAGE=n
          CONFIG_STATIC=y
          EOF

          # Patch header issue
          sed -i 's/char BUG_off_t_size_is_misdetected/\/\/ char BUG_off_t_size_is_misdetected/' include/libbb.h

          make oldconfig

          # Remove shell applets safely (best-effort)
          sed -i '/ash_main\|hush_main\|sh_main/d' include/applet_tables.h || true
          sed -i '/APPLET.*ash\|APPLET.*hush\|IF_ASH\|IF_HUSH/d' include/applets.h || true

      - name: Compile Objects
        working-directory: ./busybox-src
        run: |
          emmake make -j$(nproc) \
            CC=emcc \
            CFLAGS="-D_POSIX_C_SOURCE=200809L -D_FILE_OFFSET_BITS=32" \
            SKIP_STRIP=y || true

      - name: Manual Force-Link
        working-directory: ./busybox-src
        run: |
          mkdir -p ../dist

          cat > ../wasm_main.c << 'EOF'
          int sed_main(int argc, char **argv) __attribute__((weak));
          
          int main(int argc, char **argv) {
              return sed_main(argc, argv);
          }
          EOF

          emcc -O3 \
            ../wasm_main.c \
            editors/lib.a \
            libbb/lib.a \
            -o ../dist/busybox.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createBusyBox \
            -s ENVIRONMENT=web \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_RUNTIME_METHODS='["FS","callMain"]' \
            -s EXIT_RUNTIME=0 \
            -s INVOKE_RUN=0 \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s INITIAL_MEMORY=33554432 \
            -s ALLOW_MEMORY_GROWTH=1

      - name: Verify wasm contains sed
        working-directory: ./busybox-src
        run: |
          strings ../dist/busybox.wasm | grep -q "sed" || \
            (echo "ERROR: sed not found in wasm" && exit 1)

          echo "OK: sed confirmed in wasm"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git rm --cached -f dist/busybox.js dist/busybox.wasm 2>/dev/null || true
          git add -f dist/busybox.js dist/busybox.wasm

          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update busybox-sed wasm"
            git push
          fi
