name: Build BusyBox (sed) to WebAssembly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-busybox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox (Minimal Sed)
        working-directory: ./busybox-src
        run: |
          make allnoconfig
          cat >> .config << 'EOF'
          CONFIG_SED=y
          CONFIG_LFS=n
          CONFIG_FEATURE_SHOW_USAGE=n
          CONFIG_STATIC=y
          CONFIG_SH_IS_NONE=y
          EOF
          
          # FORCE-REMOVE ASH REFERENCES:
          # This prevents the "missing ash_main" error by ensuring the applet 
          # table doesn't even try to reference a shell.
          sed -i 's/IF_ASH(APPLET(ash,.*)/\/* ash removed *\//' include/applets.h
          
          # Patch headers to avoid size checks
          sed -i 's/char BUG_off_t_size_is_misdetected/ \/\/ char BUG_off_t_size_is_misdetected/' include/libbb.h
          make oldconfig

      - name: Compile Objects
        working-directory: ./busybox-src
        run: |
          emmake make -j$(nproc) \
            CC=emcc \
            CFLAGS="-D_POSIX_C_SOURCE=200809L -D_FILE_OFFSET_BITS=32" \
            SKIP_STRIP=y || true

      - name: Manual Force-Link
        working-directory: ./busybox-src
        run: |
          mkdir -p ../dist
          
          # We use -s INVOKE_RUN=0 so it doesn't try to start a default applet on load
          emcc -O3 \
            applets/built-in.o \
            editors/lib.a \
            libbb/lib.a \
            -o ../dist/busybox.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createBusyBox \
            -s ENVIRONMENT=web \
            -s FILESYSTEM=1 \
            -s EXPORTED_RUNTIME_METHODS='["FS", "callMain"]' \
            -s EXPORTED_FUNCTIONS='["_main"]' \
            -s EXIT_RUNTIME=1 \
            -s INVOKE_RUN=0 \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s INITIAL_MEMORY=32MB \
            -s ALLOW_MEMORY_GROWTH=1

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/busybox.js dist/busybox.wasm
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update compiled busybox-sed wasm (browser-safe)"
            git push
          fi
