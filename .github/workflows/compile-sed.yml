name: Build BusyBox sed to WebAssembly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          curl -L -o busybox.tar.bz2 https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox for sed
        working-directory: ./busybox-src
        run: |
          make allnoconfig
          cat >> .config <<'EOF'
          CONFIG_HAVE_DOT_CONFIG=y
          CONFIG_SED=y
          CONFIG_FEATURE_SED_GNU_EXTENSIONS=y
          CONFIG_FEATURE_SED_EGREP_ALIAS=n
          CONFIG_LFS=y
          CONFIG_STATIC=n
          EOF
          yes "" | make oldconfig

      - name: Build BusyBox with Emscripten
        working-directory: ./busybox-src
        run: |
          emmake make -j"$(nproc)" busybox \
            CFLAGS="-O3 -s WASM=1 -s ENVIRONMENT=web -s ALLOW_MEMORY_GROWTH=1" \
            LDFLAGS="-s MODULARIZE=1 -s EXPORT_NAME=createBusyBox -s ENVIRONMENT=web -s FORCE_FILESYSTEM=1 -s ALLOW_MEMORY_GROWTH=1"

      - name: Package browser artifacts
        working-directory: ./busybox-src
        run: |
          mkdir -p ../dist
          cp busybox.js ../dist/sed.js
          cp busybox.wasm ../dist/sed.wasm

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/sed.js dist/sed.wasm
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update browser sed wasm"
            git push
          fi
