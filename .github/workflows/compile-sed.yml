name: Build BusyBox (sed) to WebAssembly
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-busybox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox
        working-directory: ./busybox-src
        run: |
          # 1. Start with a clean, 'all-no' config
          make allnoconfig
          
          # 2. Force-enable SED and its dependencies directly in the .config file
          # We use -i to replace the 'not set' lines with 'y'
          sed -i 's/# CONFIG_SED is not set/CONFIG_SED=y/' .config
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          sed -i 's/# CONFIG_FEATURE_SED_LONG_OPTIONS is not set/CONFIG_FEATURE_SED_LONG_OPTIONS=y/' .config
          
          # 3. Ensure shell choices are set to 'none' to avoid the choice menu
          sed -i 's/CONFIG_SH_IS_ASH=y/CONFIG_SH_IS_NONE=y/' .config || echo "CONFIG_SH_IS_NONE=y" >> .config
          sed -i 's/CONFIG_BASH_IS_ASH=y/CONFIG_BASH_IS_NONE=y/' .config || echo "CONFIG_BASH_IS_NONE=y" >> .config

          # 4. Finalize the config without asking questions
          # Using oldconfig with /dev/null fallback
          make oldconfig KCONFIG_NOTIMESTAMP=1 < /dev/null || true
          
          # 5. Emscripten header fix
          sed -i 's/char BUG_off_t_size_is_misdetected/ \/\/ char BUG_off_t_size_is_misdetected/' include/libbb.h

      - name: Compile Objects
        working-directory: ./busybox-src
        run: |
          # We explicitly build the .o file for sed to ensure it exists
          emmake make -j$(nproc) CC=emcc editors/sed.o libbb/lib.a

      - name: Link to WebAssembly
        run: |
          # Create the wrapper
          cat <<EOF > wasm_main.c
          const char *applet_name = "sed";
          extern int sed_main(int argc, char **argv);
          int main(int argc, char **argv) {
              return sed_main(argc, argv);
          }
          EOF

          mkdir -p dist
          
          # Link: wrapper + sed.o + the whole libbb archive
          emcc -O2 \
            wasm_main.c \
            busybox-src/editors/sed.o \
            -Wl,--whole-archive busybox-src/libbb/lib.a -Wl,--no-whole-archive \
            -o dist/busybox.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createBusyBox \
            -s ENVIRONMENT=web \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_RUNTIME_METHODS='["FS","callMain"]' \
            -s EXIT_RUNTIME=0 \
            -s INVOKE_RUN=0 \
            -s INITIAL_MEMORY=33554432 \
            -s ALLOW_MEMORY_GROWTH=1

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/busybox.js dist/busybox.wasm
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update compiled busybox-sed wasm"
            git push
          fi
