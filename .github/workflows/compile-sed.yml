name: Build BusyBox (sed) to WebAssembly
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-busybox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox
        working-directory: ./busybox-src
        run: |
          cat <<EOF > ci_config.seed
          CONFIG_SED=y
          CONFIG_STATIC=y
          CONFIG_SH_IS_NONE=y
          CONFIG_BASH_IS_NONE=y
          EOF
          make allnoconfig KCONFIG_ALLCONFIG=ci_config.seed
          make oldconfig KCONFIG_NOTIMESTAMP=1 < /dev/null
          sed -i 's/char BUG_off_t_size_is_misdetected/ \/\/ char BUG_off_t_size_is_misdetected/' include/libbb.h

      - name: Compile Objects
        working-directory: ./busybox-src
        run: |
          # Build sed and the utility library
          emmake make -j$(nproc) CC=emcc editors/sed.o libbb/lib.a

      - name: Link to WebAssembly
        run: |
          # 1. Create the wrapper
          cat <<EOF > wasm_main.c
          const char *applet_name = "sed";
          extern int sed_main(int argc, char **argv);
          int main(int argc, char **argv) {
              return sed_main(argc, argv);
          }
          EOF

          # 2. SURGERY: Remove the conflicting object from the library
          # This removes the BusyBox 'main' so our 'main' can rule them all
          cp busybox-src/libbb/lib.a libbb_clean.a
          ar d libbb_clean.a appletlib.o

          mkdir -p dist
          
          # 3. Link using the cleaned library
          emcc -O2 \
            wasm_main.c \
            busybox-src/editors/sed.o \
            -Wl,--whole-archive libbb_clean.a -Wl,--no-whole-archive \
            -o dist/busybox.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createBusyBox \
            -s ENVIRONMENT=web \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_RUNTIME_METHODS='["FS","callMain"]' \
            -s EXIT_RUNTIME=0 \
            -s INVOKE_RUN=0 \
            -s INITIAL_MEMORY=33554432 \
            -s ALLOW_MEMORY_GROWTH=1

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/busybox.js dist/busybox.wasm
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update compiled busybox-sed wasm"
            git push
          fi
