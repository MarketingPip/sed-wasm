name: Build pure sed WebAssembly (no BusyBox)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download GNU sed
        run: |
          wget https://ftp.gnu.org/gnu/sed/sed-4.9.tar.xz
          tar -xf sed-4.9.tar.xz
          mv sed-4.9 sed-src

      - name: Configure minimal build
        working-directory: ./sed-src
        run: |
          emconfigure ./configure \
            --disable-nls \
            --disable-dependency-tracking \
            --without-included-regex \
            --prefix=/usr

      - name: Build sed to WASM (minimal runtime)
        working-directory: ./sed-src
        run: |
          emmake make -j$(nproc) CFLAGS="-O3"

      - name: Link to WebAssembly (NO FS BACKEND)
        working-directory: ./sed-src
        run: |
          mkdir -p ../dist

          emcc sed/sed.o \
            -O3 \
            -o ../dist/sed.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createSed \
            -s ENVIRONMENT=web \
            -s INVOKE_RUN=0 \
            -s EXIT_RUNTIME=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s INITIAL_MEMORY=16MB \
            -s EXPORTED_RUNTIME_METHODS='["callMain"]' \
            -s ERROR_ON_UNDEFINED_SYMBOLS=1

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f dist/sed.js dist/sed.wasm

          git commit -m "build: pure sed wasm (no busybox, no FS layer)" || true
          git push || true
