name: Build BusyBox (sed) to WebAssembly
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-busybox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox
        working-directory: ./busybox-src
        run: |
          # 1. Clear everything
          make clean
          
          # 2. Create the most basic seed possible
          # We must use the exact internal names used by BusyBox
          cat <<EOF > .config
          CONFIG_SED=y
          CONFIG_STATIC=y
          CONFIG_SH_IS_NONE=y
          CONFIG_BASH_IS_NONE=y
          CONFIG_NO_USAGE_STRINGS=y
          CONFIG_FEATURE_VERBOSE_USAGE=n
          CONFIG_FEATURE_COMPRESS_USAGE=n
          EOF
          
          # 3. Use 'olddefconfig' - if it fails, fallback to 'allnoconfig' with the seed.
          # We use 'yes n' as a tertiary shield.
          make olddefconfig KCONFIG_NOTIMESTAMP=1 || yes n | make allnoconfig KCONFIG_ALLCONFIG=.config
          
          # 4. Fix Emscripten header conflict
          sed -i 's/char BUG_off_t_size_is_misdetected/ \/\/ char BUG_off_t_size_is_misdetected/' include/libbb.h

      - name: Compile Objects
        working-directory: ./busybox-src
        run: |
          # Only build what sed needs. This bypasses the interactive 'main' build logic.
          emmake make -j$(nproc) \
            CC=emcc \
            CFLAGS="-D_POSIX_C_SOURCE=200809L -D_FILE_OFFSET_BITS=32" \
            SKIP_STRIP=y \
            editors/lib.a libbb/lib.a

      - name: Link to WebAssembly
        run: |
          # 1. Check what the actual symbol name is inside the archive
          # It might be 'sed_main' or it might have a prefix depending on the config
          ACTUAL_SED_SYMBOL=$(nm busybox-src/editors/lib.a | grep -i 'T .*sed_main' | awk '{print $3}' | head -n 1)
          echo "Detected sed symbol: $ACTUAL_SED_SYMBOL"
          
          if [ -z "$ACTUAL_SED_SYMBOL" ]; then
            echo "Error: Could not find sed_main symbol in editors/lib.a"
            exit 1
          fi

          # 2. Create the wrapper using the detected symbol
          cat <<EOF > wasm_main.c
          const char *applet_name = "sed";
          extern int $ACTUAL_SED_SYMBOL(int argc, char **argv);
          int main(int argc, char **argv) {
              return $ACTUAL_SED_SYMBOL(argc, argv);
          }
          EOF

          # 3. Prepare the trimmed library
          cp busybox-src/libbb/lib.a libbb_trimmed.a
          ar d libbb_trimmed.a appletlib.o
          
          mkdir -p dist
          
          # 4. Link - we add -ldl because BusyBox utility functions often expect it
          emcc -O2 \
            wasm_main.c \
            -Wl,--whole-archive busybox-src/editors/lib.a libbb_trimmed.a -Wl,--no-whole-archive \
            -o dist/busybox.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createBusyBox \
            -s ENVIRONMENT=web \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_RUNTIME_METHODS='["FS","callMain"]' \
            -s EXIT_RUNTIME=0 \
            -s INVOKE_RUN=0 \
            -s INITIAL_MEMORY=33554432 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -ldl

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/busybox.js dist/busybox.wasm
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update compiled busybox-sed wasm"
            git push
          fi
