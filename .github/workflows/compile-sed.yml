name: Build micro-sed WebAssembly (no autotools)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download GNU sed source
        run: |
          wget https://ftp.gnu.org/gnu/sed/sed-4.9.tar.xz
          tar -xf sed-4.9.tar.xz
          mv sed-4.9 sed-src

      - name: Install minimal build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc

      - name: Build sed WITHOUT configure (clean compilation)
        working-directory: ./sed-src
        run: |
          # Force clean state
          rm -rf config.status config.cache autom4te.cache

          # We DO NOT run ./configure at all

          # Compile only required sed sources directly
          emcc -O3 \
            -I. -Isrc \
            sed/*.c \
            lib/*.c \
            -o sed.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createSed \
            -s ENVIRONMENT=web \
            -s INVOKE_RUN=0 \
            -s EXIT_RUNTIME=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s INITIAL_MEMORY=16MB \
            -s EXPORTED_RUNTIME_METHODS='["callMain","FS"]' \
            -s ERROR_ON_UNDEFINED_SYMBOLS=1

      - name: Move output
        run: |
          mkdir -p dist
          mv sed-src/sed.js dist/sed.js
          mv sed-src/sed.wasm dist/sed.wasm

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f dist/sed.js dist/sed.wasm

          git commit -m "build: micro-sed wasm (no autotools, no configure)" || true
          git push || true
