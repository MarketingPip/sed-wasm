name: Build BusyBox (sed) to WebAssembly
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-busybox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox
        working-directory: ./busybox-src
        run: |
          make allnoconfig
          # Use BusyBox's own config script for reliability
          ./scripts/config --enable CONFIG_SED
          ./scripts/config --enable CONFIG_STATIC
          ./scripts/config --disable CONFIG_ASH
          ./scripts/config --disable CONFIG_HUSH
          
          # Fix for Emscripten's long/off_t checks
          sed -i 's/char BUG_off_t_size_is_misdetected/ \/\/ char BUG_off_t_size_is_misdetected/' include/libbb.h
          
          make oldconfig KCONFIG_NOTIMESTAMP=1 < /dev/null

      - name: Compile Objects
        working-directory: ./busybox-src
        run: |
          # Build only the necessary libraries
          emmake make -j$(nproc) \
            CC=emcc \
            CFLAGS="-D_POSIX_C_SOURCE=200809L -D_FILE_OFFSET_BITS=32" \
            SKIP_STRIP=y || true

      - name: Link to WebAssembly
        run: |
          # 1. Create a wrapper that defines the missing applet_name symbol
          cat <<EOF > wasm_main.c
          const char *applet_name = "sed";
          int sed_main(int argc, char **argv);
          int main(int argc, char **argv) {
              return sed_main(argc, argv);
          }
          EOF

          # 2. Trim appletlib.o to avoid duplicate 'main' symbols
          cp busybox-src/libbb/lib.a libbb_trimmed.a
          ar d libbb_trimmed.a appletlib.o
          
          mkdir -p dist
          
          # 3. Link with --whole-archive to prevent "missing function" errors at runtime
          emcc -O2 \
            wasm_main.c \
            -Wl,--whole-archive busybox-src/editors/lib.a libbb_trimmed.a -Wl,--no-whole-archive \
            -o dist/busybox.js \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createBusyBox \
            -s ENVIRONMENT=web \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_RUNTIME_METHODS='["FS","callMain"]' \
            -s EXPORTED_FUNCTIONS='["_main","_malloc","_free"]' \
            -s EXIT_RUNTIME=0 \
            -s INVOKE_RUN=0 \
            -s INITIAL_MEMORY=33554432 \
            -s ALLOW_MEMORY_GROWTH=1

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/busybox.js dist/busybox.wasm
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update compiled busybox-sed wasm"
            git push
          fi
