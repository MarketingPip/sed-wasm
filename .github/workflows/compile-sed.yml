name: Build BusyBox (sed) to WebAssembly

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-busybox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xjf busybox-1.36.1.tar.bz2
          mv busybox-1.36.1 busybox-src

      - name: Configure BusyBox for WASM
        working-directory: ./busybox-src
        run: |
          # Start with a totally empty config
          make allnoconfig
          
          # Enable only sed and its dependencies
          cat >> .config << 'EOF'
          CONFIG_SED=y
          CONFIG_FEATURE_SHOW_USAGE=n
          CONFIG_STATIC=y
          CONFIG_PLATFORM_LINUX=y
          EOF
          
          # Apply the config
          make oldconfig

      - name: Build BusyBox with Emscripten
        working-directory: ./busybox-src
        run: |
          # LDFLAGS handles the linking quirks
          # SKIP_STRIP=y is required because emcc doesn't support the 'strip' command
          emmake make -j$(nproc) \
            CC=emcc \
            CFLAGS="-D_POSIX_C_SOURCE=200809L" \
            SKIP_STRIP=y \
            busybox_unstripped

      - name: Link to WebAssembly
        working-directory: ./busybox-src
        run: |
          mkdir -p ../dist
          
          # Link the unstripped object into the JS/Wasm bundle
          emcc busybox_unstripped \
            -O3 \
            -s WASM=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME=createBusyBox \
            -s FORCE_FILESYSTEM=1 \
            -s EXPORTED_FUNCTIONS='["_main"]' \
            -s EXIT_RUNTIME=1 \
            -o ../dist/busybox.js

      - name: Commit WASM build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/busybox.js dist/busybox.wasm
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: build busybox wasm (sed enabled)"
            git push
          fi
